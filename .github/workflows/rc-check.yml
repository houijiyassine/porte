name: RC Door Check
on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check RC Door State
        uses: actions/github-script@v7
        env:
          SB_URL: https://sjfaootvlxesdytdsknc.supabase.co
          SB_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqZmFvb3R2bHhlc2R5dGRza25jIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE4MDI1NywiZXhwIjoyMDg4NzU2MjU3fQ.R_0KS6U0VUKfFheCxJ5rmKY9vo7UkVkSx2lFwLjGvFI
          TUYA_CLIENT: 59gmr8xdf3m5vdt55c89
          TUYA_SECRET: f551321a6229419098b3c40728460bdd
        with:
          script: |
            const crypto = require('crypto');
            const SB_URL = process.env.SB_URL;
            const SB_KEY = process.env.SB_KEY;
            const CLIENT_ID = process.env.TUYA_CLIENT;
            const SECRET = process.env.TUYA_SECRET;
            const BASE = 'https://openapi.tuyaeu.com';
            function sign(str){return crypto.createHmac('sha256',SECRET).update(str).digest('hex').toUpperCase();}
            function sha256(str){return crypto.createHash('sha256').update(str).digest('hex');}
            async function getToken(){
              const t=Date.now().toString(),url='/v1.0/token?grant_type=1';
              const s=sign(CLIENT_ID+t+''+['GET',sha256(''),'',url].join('\n'));
              const r=await fetch(`${BASE}${url}`,{headers:{client_id:CLIENT_ID,sign:s,t,nonce:'',sign_method:'HMAC-SHA256'}});
              const d=await r.json();if(!d.success)throw new Error('Token:'+d.msg);return d.result?.access_token;
            }
            async function getDoorState(devId,tok){
              const t=Date.now().toString(),url=`/v1.0/iot-03/devices/${devId}/status`;
              const s=sign(CLIENT_ID+tok+t+''+['GET',sha256(''),'',url].join('\n'));
              const r=await fetch(`${BASE}${url}`,{headers:{client_id:CLIENT_ID,access_token:tok,sign:s,t,nonce:'',sign_method:'HMAC-SHA256'}});
              const d=await r.json();if(!d.success)return null;
              const s1=d.result?.find(x=>x.code==='switch_1')?.value,s2=d.result?.find(x=>x.code==='switch_2')?.value;
              if(s1===true&&s2===false)return 'open';if(s1===false&&s2===true)return 'close';return 'stopped';
            }
            async function sbGet(p){const r=await fetch(`${SB_URL}/rest/v1/${p}`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});return r.json();}
            async function sbPatch(t,id,b){await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify(b)});}
            const [insts,users]=await Promise.all([sbGet('institutes?select=id,name,doors,rc_door_states'),sbGet('users?select=id,name,role,inst_id,push_sub')]);
            console.log('insts:',insts.length,'users:',users.length);
            const tok=await getToken();
            for(const inst of insts){
              const doors=Array.isArray(inst.doors)?inst.doors:[];
              const prev=inst.rc_door_states||{},next={...prev};let changed=false;
              for(const door of doors){
                if(!door.devId)continue;
                const state=await getDoorState(door.devId,tok);
                console.log(door.name,':',state);
                if(!state||state==='stopped')continue;
                if(prev[door.id]===undefined){next[door.id]=state;changed=true;continue;}
                if(state===prev[door.id])continue;
                next[door.id]=state;changed=true;
                const title=`🚪 ${state==='open'?'فتح':'غلق'} الباب`;
                const body=`${door.name} — ${state==='open'?'تم الفتح':'تم الغلق'} عبر جهاز التحكم`;
                const targets=users.filter(u=>u.role==='admin'&&u.inst_id===inst.id&&u.push_sub);
                for(const u of targets){
                  try{
                    await fetch('https://project-xb9ro.vercel.app/api/push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target_user_id:u.id,custom_title:title,custom_body:body})});
                    console.log('Push sent to',u.name);
                  }catch(e){console.warn('Push failed:',e.message);}
                }
              }
              if(changed)await sbPatch('institutes',inst.id,{rc_door_states:next});
            }
            console.log('Done');
