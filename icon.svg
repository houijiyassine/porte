<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0a0f1e"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" opacity="0.15"/>
  <!-- Lock body -->
  <rect x="136" y="256" width="240" height="180" rx="28" fill="url(#bodyGrad)"/>
  <!-- Lock shackle -->
  <path d="M176 256 V190 Q176 130 256 130 Q336 130 336 190 V256" 
        fill="none" stroke="url(#shackleGrad)" stroke-width="36" stroke-linecap="round"/>
  <!-- Keyhole circle -->
  <circle cx="256" cy="335" r="28" fill="#0a0f1e"/>
  <!-- Keyhole stem -->
  <rect x="244" y="335" width="24" height="40" rx="12" fill="#0a0f1e"/>
  <!-- Key accent -->
  <circle cx="385" cy="155" r="38" fill="none" stroke="#06b6d4" stroke-width="14" opacity="0.8"/>
  <rect x="385" y="185" width="14" height="60" rx="7" fill="#06b6d4" opacity="0.8"/>
  <rect x="385" y="220" width="28" height="12" rx="4" fill="#06b6d4" opacity="0.8"/>
  <rect x="385" y="238" width="20" height="10" rx="4" fill="#06b6d4" opacity="0.8"/>
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shackleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>